<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="it" lang="it">
<head>
    <title>Login - Progetto Spotify</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link rel="stylesheet" type="text/css" href="_login.css" />
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <img src="img/spotify_newLogo.png" alt="Logo Spotify" class="logo" />
            
            <h2>Per continuare, accedi a Spotify.</h2>
            
            <form action="#" method="post">
                <div class="input-group">
                    <label for="email">Indirizzo e-mail o nome utente</label>
                    <input type="text" id="email" name="email" placeholder="Indirizzo e-mail o nome utente" />
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" />
                </div>
                
                <div class="options">
                    <label><input type="checkbox" /> Ricordami</label>
                    <a href="#">Password dimenticata?</a>
                </div>
                
                <button type="submit" class="btn-login">ACCEDI</button>
            </form>
            
            <hr />
            
            <p class="signup-text">Non hai un account? <a href="#">ISCRIVITI</a></p>
        </div>
    </div>

</body>
</html>
